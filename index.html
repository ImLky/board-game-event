<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>부루마블 이벤트 게임</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root{--accent:#FF6B6B;--primary:#4A90D9;--gold:#FFD93D;--green:#6BCB77;--purple:#9B59B6;--dark:#2C3E50;--white:#FFF;--gray:#95A5A6;--light:#ECF0F1;--board-bg:#F8F4E8;--font:'Pretendard',-apple-system,sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--dark)}
    .header{text-align:center;padding:20px 16px 10px;color:var(--white)}
    .header h1{font-size:28px;font-weight:800;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
    .header p{font-size:14px;opacity:.8;margin-top:4px}
    .game{background:var(--white);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);margin:10px 16px 20px;padding:16px;max-width:600px;width:calc(100% - 32px)}
    .setup{text-align:center;padding:20px 0}.setup h2{font-size:20px;font-weight:700;margin-bottom:16px}
    .setup-opts{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
    .setup-btn{width:60px;height:60px;border-radius:12px;border:3px solid var(--light);background:var(--white);font-size:24px;font-weight:800;cursor:pointer;transition:.2s;font-family:var(--font)}
    .setup-btn:hover{border-color:var(--primary)}.setup-btn.sel{border-color:var(--primary);background:var(--primary);color:#fff}
    .start-btn{background:linear-gradient(135deg,var(--accent),#ee5a5a);color:#fff;border:0;padding:14px 48px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;font-family:var(--font)}
    .start-btn:disabled{background:var(--gray);cursor:not-allowed}
    .board-wrap{position:relative}
    .board{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:3px;width:100%;aspect-ratio:1;background:var(--board-bg);border-radius:12px;padding:6px}
    .cell{background:var(--white);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;border:2px solid transparent;transition:.3s;min-height:0}
    .cell.active{border-color:var(--accent);z-index:2}.cell.hide{visibility:hidden;background:0 0}
    .cell .ico{font-size:18px;line-height:1}.cell .nm{font-size:8px;margin-top:1px;font-weight:600;text-align:center}
    .cell.start{background:linear-gradient(135deg,#FF6B6B,#ee5a5a);color:#fff}.cell.start .nm{color:#fff}
    .cell.coupon{border-left:3px solid var(--accent)}.cell.mission{border-left:3px solid var(--primary)}
    .cell.blank{border-left:3px solid var(--gray)}.cell.bonus{border-left:3px solid var(--gold)}.cell.special{border-left:3px solid var(--purple)}
    .tk{position:absolute;width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:10;transition:left .25s,top .25s;display:flex;align-items:center;justify-content:center;font-size:12px;pointer-events:none}
    .tk0{background:#FF6B6B}.tk1{background:#4A90D9}.tk2{background:#6BCB77}.tk3{background:#FFD93D}
    .players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
    .ptag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid transparent;background:var(--light)}
    .ptag.on{border-color:var(--dark);background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .pdot{width:14px;height:14px;border-radius:50%;display:inline-block}
    /* 3D Dice */
    .dice-wrap{position:relative;width:100%;height:200px;margin-top:12px;border-radius:12px;overflow:hidden;background:#d4c9b5;border:2px solid #b8ad97}
    .dice-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
    .dice-val{text-align:center;height:40px;display:flex;align-items:center;justify-content:center}
    .dice-val span{font-size:32px;font-weight:800;color:var(--accent);opacity:0;transform:scale(.5);transition:all .4s cubic-bezier(.2,1,.3,1)}
    .dice-val span.show{opacity:1;transform:scale(1)}
    .ctrls{text-align:center;margin-top:8px}
    .roll-btn{background:linear-gradient(135deg,var(--accent),#ee5a5a);color:#fff;border:0;padding:14px 40px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 16px rgba(255,107,107,.4);transition:.2s}
    .roll-btn:hover{transform:translateY(-2px)}.roll-btn:disabled{background:var(--gray);cursor:not-allowed;transform:none;box-shadow:none}
    .status{text-align:center;margin-top:12px;padding:10px;background:var(--light);border-radius:8px;font-size:14px;font-weight:600}
    .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}.moverlay.show{display:flex}
    .mdl{background:#fff;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;text-align:center;animation:mIn .3s}
    @keyframes mIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .mdl-icon{font-size:56px;margin-bottom:12px}.mdl-title{font-size:22px;font-weight:800;margin-bottom:8px}
    .mdl-desc{font-size:15px;color:var(--gray);margin-bottom:20px;line-height:1.5}
    .mdl-btn{background:var(--primary);color:#fff;border:0;padding:12px 32px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font)}
    .result{display:none;text-align:center;padding:20px 0}.result.show{display:block}
    .result h2{font-size:22px;font-weight:800;margin-bottom:16px}
    .rplayer{text-align:left;margin:12px 0;padding:12px;background:var(--light);border-radius:10px}
    .rplayer-name{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .ritem{font-size:13px;padding:4px 0}
    .restart-btn{background:var(--green);color:#fff;border:0;padding:14px 40px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:16px}
    .hidden{display:none}
    @media(max-width:480px){.header h1{font-size:22px}.game{padding:10px;margin:8px 8px 16px}.cell .ico{font-size:14px}.cell .nm{font-size:7px}.tk{width:20px;height:20px;font-size:10px}.roll-btn{padding:12px 32px;font-size:16px}.dice-wrap{height:160px}}
  </style>
</head>
<body>
<header class="header"><h1>🎲 부루마블 이벤트</h1><p>주사위를 굴려 경품을 획득하세요!</p></header>
<div class="game">
  <div class="setup" id="setup"><h2>참여 인원을 선택하세요</h2><div class="setup-opts" id="opts"></div><button class="start-btn" id="startBtn" disabled>게임 시작</button></div>
  <div id="gs" class="hidden">
    <div class="players" id="pl"></div>
    <div class="board-wrap" id="bw"><div class="board" id="bd"></div></div>
    <div class="dice-wrap"><canvas id="diceCanvas"></canvas></div>
    <div class="dice-val"><span id="dval"></span></div>
    <div class="ctrls" id="ctrls"><button class="roll-btn" id="rollBtn">🎲 주사위 굴리기</button></div>
    <div class="status" id="st">주사위를 굴려 게임을 시작하세요!</div>
    <div class="result" id="res"><span class="mdl-icon">🎉</span><h2>게임 완료!</h2><div id="rc"></div><button class="restart-btn" id="rstBtn">🔄 다시 하기</button></div>
  </div>
</div>
<div class="moverlay" id="mo"><div class="mdl"><div class="mdl-icon" id="mi"></div><div class="mdl-title" id="mt"></div><div class="mdl-desc" id="md"></div><button class="mdl-btn" id="mb">확인</button></div></div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.151.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.151.0/examples/jsm/"}}
</script>
<script type="module">
import*as CANNON from'https://cdn.skypack.dev/cannon-es';
import*as THREE from'three';
import*as BufferGeometryUtils from'three/addons/utils/BufferGeometryUtils.js';

/* ===== 3D DICE (from codepen ksenia-k) ===== */
const canvasEl=document.getElementById('diceCanvas');
let renderer,scene,camera,diceMesh,physicsWorld;
const params={numberOfDice:1,segments:40,edgeRadius:.1,notchRadius:.15,notchDepth:.09};
const diceArray=[];
let diceReady=false,onResult=null;

function initPhysics(){
  physicsWorld=new CANNON.World({allowSleep:true,gravity:new CANNON.Vec3(0,-60,0)});
  physicsWorld.defaultContactMaterial.restitution=.3;
}

function initDiceScene(){
  const wrap=canvasEl.parentElement;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer=new THREE.WebGLRenderer({alpha:true,antialias:true,canvas:canvasEl});
  renderer.shadowMap.enabled=true;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(w,h);
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,w/h,.1,100);
  camera.position.set(0,.4,3.5).multiplyScalar(3);
  camera.lookAt(0,-4,0);

  scene.add(new THREE.AmbientLight(0xffffff,.5));
  const tl=new THREE.PointLight(0xffffff,.5);
  tl.position.set(10,15,3);tl.castShadow=true;
  tl.shadow.mapSize.set(1024,1024);tl.shadow.camera.near=5;tl.shadow.camera.far=400;
  scene.add(tl);

  const floor=new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),new THREE.ShadowMaterial({opacity:.15}));
  floor.receiveShadow=true;floor.position.y=-7;
  floor.quaternion.setFromAxisAngle(new THREE.Vector3(-1,0,0),Math.PI*.5);
  scene.add(floor);
  const fb=new CANNON.Body({type:CANNON.Body.STATIC,shape:new CANNON.Plane()});
  fb.position.copy(floor.position);fb.quaternion.copy(floor.quaternion);
  physicsWorld.addBody(fb);

  diceMesh=createDiceMesh();
  for(let i=0;i<params.numberOfDice;i++){diceArray.push(createDice());addDiceEvents(diceArray[i])}
  diceReady=true;
  renderDice();
}

function createDiceMesh(){
  const outer=new THREE.MeshStandardMaterial({color:0xeeeeee});
  const inner=new THREE.MeshStandardMaterial({color:0x000000,roughness:0,metalness:1,side:THREE.DoubleSide});
  const g=new THREE.Group();
  g.add(new THREE.Mesh(createInnerGeometry(),inner));
  const om=new THREE.Mesh(createBoxGeometry(),outer);om.castShadow=true;g.add(om);
  return g;
}

function createDice(){
  const mesh=diceMesh.clone();scene.add(mesh);
  const body=new CANNON.Body({mass:.3,shape:new CANNON.Box(new CANNON.Vec3(.5,.5,.5)),sleepTimeLimit:.02});
  physicsWorld.addBody(body);return{mesh,body};
}

function createBoxGeometry(){
  let geo=new THREE.BoxGeometry(1,1,1,params.segments,params.segments,params.segments);
  const pos=geo.attributes.position;const sh=.5-params.edgeRadius;
  for(let i=0;i<pos.count;i++){
    let p=new THREE.Vector3().fromBufferAttribute(pos,i);
    const sc=new THREE.Vector3(Math.sign(p.x),Math.sign(p.y),Math.sign(p.z)).multiplyScalar(sh);
    const ad=new THREE.Vector3().subVectors(p,sc);
    if(Math.abs(p.x)>sh&&Math.abs(p.y)>sh&&Math.abs(p.z)>sh){ad.normalize().multiplyScalar(params.edgeRadius);p=sc.add(ad)}
    else if(Math.abs(p.x)>sh&&Math.abs(p.y)>sh){ad.z=0;ad.normalize().multiplyScalar(params.edgeRadius);p.x=sc.x+ad.x;p.y=sc.y+ad.y}
    else if(Math.abs(p.x)>sh&&Math.abs(p.z)>sh){ad.y=0;ad.normalize().multiplyScalar(params.edgeRadius);p.x=sc.x+ad.x;p.z=sc.z+ad.z}
    else if(Math.abs(p.y)>sh&&Math.abs(p.z)>sh){ad.x=0;ad.normalize().multiplyScalar(params.edgeRadius);p.y=sc.y+ad.y;p.z=sc.z+ad.z}
    const nw=v=>{v=(1/params.notchRadius)*v;v=Math.PI*Math.max(-1,Math.min(1,v));return params.notchDepth*(Math.cos(v)+1.)};
    const notch=ps=>nw(ps[0])*nw(ps[1]);const o=.23;
    if(p.y===.5)p.y-=notch([p.x,p.z]);
    else if(p.x===.5){p.x-=notch([p.y+o,p.z+o]);p.x-=notch([p.y-o,p.z-o])}
    else if(p.z===.5){p.z-=notch([p.x-o,p.y+o]);p.z-=notch([p.x,p.y]);p.z-=notch([p.x+o,p.y-o])}
    else if(p.z===-.5){p.z+=notch([p.x+o,p.y+o]);p.z+=notch([p.x+o,p.y-o]);p.z+=notch([p.x-o,p.y+o]);p.z+=notch([p.x-o,p.y-o])}
    else if(p.x===-.5){p.x+=notch([p.y+o,p.z+o]);p.x+=notch([p.y+o,p.z-o]);p.x+=notch([p.y,p.z]);p.x+=notch([p.y-o,p.z+o]);p.x+=notch([p.y-o,p.z-o])}
    else if(p.y===-.5){p.y+=notch([p.x+o,p.z+o]);p.y+=notch([p.x+o,p.z]);p.y+=notch([p.x+o,p.z-o]);p.y+=notch([p.x-o,p.z+o]);p.y+=notch([p.x-o,p.z]);p.y+=notch([p.x-o,p.z-o])}
    pos.setXYZ(i,p.x,p.y,p.z);
  }
  geo.deleteAttribute('normal');geo.deleteAttribute('uv');
  geo=BufferGeometryUtils.mergeVertices(geo);geo.computeVertexNormals();return geo;
}

function createInnerGeometry(){
  const bg=new THREE.PlaneGeometry(1-2*params.edgeRadius,1-2*params.edgeRadius);const o=.48;
  return BufferGeometryUtils.mergeBufferGeometries([
    bg.clone().translate(0,0,o),bg.clone().translate(0,0,-o),
    bg.clone().rotateX(.5*Math.PI).translate(0,-o,0),bg.clone().rotateX(.5*Math.PI).translate(0,o,0),
    bg.clone().rotateY(.5*Math.PI).translate(-o,0,0),bg.clone().rotateY(.5*Math.PI).translate(o,0,0)
  ],false);
}

function addDiceEvents(dice){
  dice.body.addEventListener('sleep',e=>{
    dice.body.allowSleep=false;
    const eu=new CANNON.Vec3();e.target.quaternion.toEuler(eu);
    const eps=.1;
    const isZ=a=>Math.abs(a)<eps,isH=a=>Math.abs(a-.5*Math.PI)<eps,isMH=a=>Math.abs(.5*Math.PI+a)<eps,isP=a=>(Math.abs(Math.PI-a)<eps||Math.abs(Math.PI+a)<eps);
    let score=0;
    if(isZ(eu.z)){if(isZ(eu.x))score=1;else if(isH(eu.x))score=4;else if(isMH(eu.x))score=3;else if(isP(eu.x))score=6;else{dice.body.allowSleep=true;return}}
    else if(isH(eu.z))score=2;else if(isMH(eu.z))score=5;else{dice.body.allowSleep=true;return}
    if(score&&onResult){onResult(score);onResult=null}
  });
}

function throwDice3D(){
  diceArray.forEach((d,i)=>{
    d.body.velocity.setZero();d.body.angularVelocity.setZero();
    d.body.position=new CANNON.Vec3(4,i*1.5,-.5);d.mesh.position.copy(d.body.position);
    d.mesh.rotation.set(2*Math.PI*Math.random(),0,2*Math.PI*Math.random());
    d.body.quaternion.copy(d.mesh.quaternion);
    const f=1+2*Math.random();
    d.body.applyImpulse(new CANNON.Vec3(-f,f,0),new CANNON.Vec3(0,0,.2));
    d.body.allowSleep=true;
  });
}

function renderDice(){
  requestAnimationFrame(renderDice);
  physicsWorld.fixedStep();
  for(const d of diceArray){d.mesh.position.copy(d.body.position);d.mesh.quaternion.copy(d.body.quaternion)}
  renderer.render(scene,camera);
}

function resizeDice(){
  const wrap=canvasEl.parentElement;const w=wrap.clientWidth,h=wrap.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
}

initPhysics();initDiceScene();
window.addEventListener('resize',()=>{resizeDice();posAll(false)});

/* ===== GAME LOGIC ===== */
const CELLS=[
{id:0,name:'출발',type:'start',icon:'🚀'},{id:1,name:'10%쿠폰',type:'coupon',icon:'🎁',reward:'10% 할인 쿠폰'},
{id:2,name:'꽝',type:'blank',icon:'💨'},{id:3,name:'미션',type:'mission',icon:'🎯',reward:'SNS 공유 미션'},
{id:4,name:'보너스',type:'bonus',icon:'🎲'},{id:5,name:'무료배송',type:'coupon',icon:'📦',reward:'무료배송 쿠폰'},
{id:6,name:'꽝',type:'blank',icon:'💨'},{id:7,name:'특별경품',type:'special',icon:'⭐',reward:'특별 경품 당첨!'},
{id:8,name:'미션',type:'mission',icon:'🎯',reward:'사진 찍기 미션'},{id:9,name:'꽝',type:'blank',icon:'💨'},
{id:10,name:'5%쿠폰',type:'coupon',icon:'🎁',reward:'5% 할인 쿠폰'},{id:11,name:'보너스',type:'bonus',icon:'🎲'},
{id:12,name:'미션',type:'mission',icon:'🎯',reward:'리뷰 작성 미션'},{id:13,name:'꽝',type:'blank',icon:'💨'},
{id:14,name:'20%쿠폰',type:'coupon',icon:'🎁',reward:'20% 할인 쿠폰'},{id:15,name:'꽝',type:'blank',icon:'💨'},
{id:16,name:'특별경품',type:'special',icon:'⭐',reward:'특별 경품 당첨!'},{id:17,name:'미션',type:'mission',icon:'🎯',reward:'친구 태그 미션'},
{id:18,name:'보너스',type:'bonus',icon:'🎲'},{id:19,name:'꽝',type:'blank',icon:'💨'}
];
const GM=[[0,1,2,3,4,5],[19,-1,-1,-1,-1,6],[18,-1,-1,-1,-1,7],[17,-1,-1,-1,-1,8],[16,-1,-1,-1,-1,9],[15,14,13,12,11,10]];
const PI=['🔴','🔵','🟢','🟡'],PN=['플레이어1','플레이어2','플레이어3','플레이어4'];
let pc=0,ps=[],cp=0,rl=false,af=false;

const opts=document.getElementById('opts');
[1,2,3,4].forEach(n=>{const b=document.createElement('button');b.className='setup-btn';b.textContent=n;b.onclick=()=>{document.querySelectorAll('.setup-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');pc=n;document.getElementById('startBtn').disabled=false};opts.appendChild(b)});
document.getElementById('startBtn').onclick=()=>{if(pc<1)return;startGame(pc)};
document.getElementById('rstBtn').onclick=goSetup;

function startGame(n){
  ps=[];for(let i=0;i<n;i++)ps.push({id:i,pos:0,rw:[],fin:false});
  cp=0;rl=false;af=false;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('gs').classList.remove('hidden');
  document.getElementById('ctrls').style.display='';document.getElementById('st').style.display='';
  document.getElementById('res').classList.remove('show');
  document.getElementById('dval').classList.remove('show');document.getElementById('dval').textContent='';
  document.getElementById('rollBtn').disabled=false;
  buildBoard();renderPtags();createToks();posAll(false);updStatus();resizeDice();
}
function goSetup(){document.getElementById('setup').classList.remove('hidden');document.getElementById('gs').classList.add('hidden');document.querySelectorAll('.setup-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('startBtn').disabled=true;pc=0}

function buildBoard(){const bd=document.getElementById('bd');bd.innerHTML='';for(let r=0;r<6;r++)for(let c=0;c<6;c++){const idx=GM[r][c],d=document.createElement('div');if(idx===-1){d.className='cell hide'}else{const cl=CELLS[idx];d.className='cell '+cl.type;d.setAttribute('data-c',idx);d.innerHTML='<span class="ico">'+cl.icon+'</span><span class="nm">'+cl.name+'</span>'}bd.appendChild(d)}}
function gCE(i){return document.querySelector('[data-c="'+i+'"]')}
function hiCell(i){document.querySelectorAll('.cell.active').forEach(c=>c.classList.remove('active'));const e=gCE(i);if(e)e.classList.add('active')}

function createToks(){const w=document.getElementById('bw');w.querySelectorAll('.tk').forEach(t=>t.remove());ps.forEach(p=>{const t=document.createElement('div');t.className='tk tk'+p.id;t.id='t'+p.id;t.textContent=PI[p.id];w.appendChild(t)})}
function posTok(pid,ci,an){const t=document.getElementById('t'+pid),ce=gCE(ci),w=document.getElementById('bw');if(!t||!ce||!w)return;const wr=w.getBoundingClientRect(),cr=ce.getBoundingClientRect(),of=[[-6,-6],[6,-6],[-6,6],[6,6]];let oi=0;if(ps.length>1){const s=ps.filter(p=>p.pos===ci&&!p.fin);for(let i=0;i<s.length;i++)if(s[i].id===pid){oi=i;break}oi%=4}t.style.transition=an?'left .25s,top .25s':'none';t.style.left=(cr.left-wr.left+cr.width/2-12+of[oi][0])+'px';t.style.top=(cr.top-wr.top+cr.height/2-12+of[oi][1])+'px'}
function posAll(a){ps.forEach(p=>{if(!p.fin)posTok(p.id,p.pos,a)})}
function renderPtags(){document.getElementById('pl').innerHTML=ps.map(p=>{const a=p.id===cp&&!p.fin?' on':'',f=p.fin?' (완료)':'',r=p.rw.length>0?' 🎁'+p.rw.length:'';return'<div class="ptag'+a+'"><span class="pdot" style="background:'+['#FF6B6B','#4A90D9','#6BCB77','#FFD93D'][p.id]+'"></span><span>'+PN[p.id]+f+r+'</span></div>'}).join('')}
function updStatus(){const p=ps[cp];document.getElementById('st').textContent=PI[p.id]+' '+PN[p.id]+'의 차례! (위치:'+p.pos+'번칸)';renderPtags();hiCell(p.pos)}

document.getElementById('rollBtn').onclick=rollDice;
function rollDice(){
  if(rl||af||!diceReady)return;rl=true;
  document.getElementById('rollBtn').disabled=true;
  document.getElementById('dval').classList.remove('show');document.getElementById('dval').textContent='';
  throwDice3D();
  onResult=val=>{
    const dn=document.getElementById('dval');dn.textContent=val;dn.classList.add('show');
    setTimeout(()=>moveCur(val),700);
  };
}

function moveCur(steps){const p=ps[cp];let tp=p.pos+steps;if(tp>=20)tp=20;const arr=[];for(let i=p.pos+1;i<=Math.min(tp,19);i++)arr.push(i);if(!arr.length){finP(cp);return}let s=0;const iv=setInterval(()=>{if(s>=arr.length){clearInterval(iv);p.pos=arr[arr.length-1];posAll(false);if(tp>=20)finP(cp);else trigEv(cp,p.pos);return}p.pos=arr[s];posTok(p.id,arr[s],true);hiCell(arr[s]);s++},300)}

function trigEv(pi,ci){const c=CELLS[ci],p=ps[pi];if(!c){nxTurn();return}const h={start:()=>nxTurn(),coupon:()=>{p.rw.push(c.reward);showM('🎁','쿠폰 획득!',PN[pi]+'님이 '+c.reward+'을 획득!',0)},mission:()=>{p.rw.push(c.reward);showM('🎯','미션!',PN[pi]+'님! '+c.reward,0)},blank:()=>showM('💨','아쉬워요!',PN[pi]+'님, 다음 기회를 노려보세요!',0),bonus:()=>showM('🎲','보너스!',PN[pi]+'님, 주사위를 한 번 더!',1),special:()=>{p.rw.push(c.reward);showM('⭐','축하합니다!',PN[pi]+'님! '+c.reward,0)}};(h[c.type]||nxTurn)()}
let pB=false;
function showM(ic,tt,ds,bn){document.getElementById('mi').textContent=ic;document.getElementById('mt').textContent=tt;document.getElementById('md').textContent=ds;document.getElementById('mo').classList.add('show');pB=!!bn;document.getElementById('mb').onclick=()=>{document.getElementById('mo').classList.remove('show');if(pB)enRoll();else nxTurn()}}
function nxTurn(){if(chkAll())return;do{cp=(cp+1)%ps.length}while(ps[cp].fin&&!chkAll());if(chkAll())return;enRoll();updStatus();posAll(false)}
function enRoll(){rl=false;document.getElementById('rollBtn').disabled=false;updStatus()}
function finP(pi){ps[pi].fin=true;const t=document.getElementById('t'+pi);if(t)t.style.opacity='.4';renderPtags();if(chkAll())showRes();else showM('🏁','골인!',PN[pi]+'님이 완주!',0)}
function chkAll(){af=ps.every(p=>p.fin);return af}
function showRes(){document.getElementById('ctrls').style.display='none';document.getElementById('st').style.display='none';document.getElementById('res').classList.add('show');let h='';ps.forEach(p=>{h+='<div class="rplayer"><div class="rplayer-name"><span class="pdot" style="width:16px;height:16px;border-radius:50%;display:inline-block;background:'+['#FF6B6B','#4A90D9','#6BCB77','#FFD93D'][p.id]+'"></span> '+PN[p.id]+' - '+p.rw.length+'개 경품</div>';if(!p.rw.length)h+='<div class="ritem">😅 획득한 경품이 없습니다</div>';else p.rw.forEach(r=>{h+='<div class="ritem">🎁 '+r+'</div>'});h+='</div>'});document.getElementById('rc').innerHTML=h}
</script>
