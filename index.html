<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>부루마블 이벤트 게임</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --accent:#FF6B6B; --primary:#4A90D9; --gold:#FFD93D; --green:#6BCB77;
      --purple:#9B59B6; --dark:#2C3E50; --white:#FFF; --gray:#95A5A6;
      --light:#ECF0F1; --board-bg:#F8F4E8; --font:'Pretendard',-apple-system,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--dark)}

    .header{text-align:center;padding:20px 16px 10px;color:var(--white)}
    .header h1{font-size:28px;font-weight:800;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
    .header p{font-size:14px;opacity:.8;margin-top:4px}

    .game{background:var(--white);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);margin:10px 16px 20px;padding:16px;max-width:600px;width:calc(100% - 32px)}

    /* Setup */
    .setup{text-align:center;padding:20px 0}
    .setup h2{font-size:20px;font-weight:700;margin-bottom:16px}
    .setup-opts{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
    .setup-btn{width:60px;height:60px;border-radius:12px;border:3px solid var(--light);background:var(--white);font-size:24px;font-weight:800;cursor:pointer;transition:.2s;font-family:var(--font)}
    .setup-btn:hover{border-color:var(--primary)}
    .setup-btn.sel{border-color:var(--primary);background:var(--primary);color:#fff}
    .start-btn{background:linear-gradient(135deg,var(--accent),#ee5a5a);color:#fff;border:0;padding:14px 48px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;font-family:var(--font)}
    .start-btn:disabled{background:var(--gray);cursor:not-allowed}

    /* Board */
    .board-wrap{position:relative}
    .board{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:3px;width:100%;aspect-ratio:1;background:var(--board-bg);border-radius:12px;padding:6px}
    .cell{background:var(--white);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;border:2px solid transparent;transition:.3s;min-height:0}
    .cell.active{border-color:var(--accent);z-index:2}
    .cell.hide{visibility:hidden;background:0 0}
    .cell .ico{font-size:18px;line-height:1}
    .cell .nm{font-size:8px;margin-top:1px;font-weight:600;text-align:center}
    .cell.start{background:linear-gradient(135deg,#FF6B6B,#ee5a5a);color:#fff}
    .cell.start .nm{color:#fff}
    .cell.coupon{border-left:3px solid var(--accent)}
    .cell.mission{border-left:3px solid var(--primary)}
    .cell.blank{border-left:3px solid var(--gray)}
    .cell.bonus{border-left:3px solid var(--gold)}
    .cell.special{border-left:3px solid var(--purple)}

    /* Token */
    .tk{position:absolute;width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:10;transition:left .25s,top .25s;display:flex;align-items:center;justify-content:center;font-size:12px;pointer-events:none}
    .tk0{background:#FF6B6B}.tk1{background:#4A90D9}.tk2{background:#6BCB77}.tk3{background:#FFD93D}

    /* Players */
    .players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
    .ptag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid transparent;background:var(--light)}
    .ptag.on{border-color:var(--dark);background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .pdot{width:14px;height:14px;border-radius:50%;display:inline-block}

    /* 3D Dice */
    .dice-stage{width:100%;height:140px;position:relative;overflow:hidden;margin-top:12px;background:linear-gradient(180deg,#ddd5c4,#c9bea8);border-radius:12px;border:2px solid #b8ad97;perspective:800px}
    .dice-pos{position:absolute;z-index:5;transform-style:preserve-3d}
    .dice-shadow{position:absolute;width:40px;height:10px;background:rgba(0,0,0,.2);border-radius:50%;filter:blur(3px);z-index:1}
    .cube{width:60px;height:60px;position:relative;transform-style:preserve-3d}
    .face{position:absolute;width:60px;height:60px;background:#fff;border:1.5px solid #bbb;border-radius:8px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px;padding:8px;backface-visibility:visible}
    .face.f1{transform:translateZ(30px)}
    .face.f2{transform:rotateY(180deg) translateZ(30px)}
    .face.f3{transform:rotateY(-90deg) translateZ(30px)}
    .face.f4{transform:rotateY(90deg) translateZ(30px)}
    .face.f5{transform:rotateX(90deg) translateZ(30px)}
    .face.f6{transform:rotateX(-90deg) translateZ(30px)}
    .pip{width:12px;height:12px;background:#333;border-radius:50%}
    /* Pip layouts */
    .face.f1{display:flex;align-items:center;justify-content:center}
    .face.f1 .pip{width:16px;height:16px}
    .face.f2{display:grid;grid-template:1fr 1fr/1fr}
    .face.f2 .pip:nth-child(1){justify-self:end;align-self:start}
    .face.f2 .pip:nth-child(2){justify-self:start;align-self:end}
    .face.f3{display:grid;grid-template:1fr 1fr 1fr/1fr}
    .face.f3 .pip:nth-child(1){justify-self:end;align-self:start}
    .face.f3 .pip:nth-child(2){justify-self:center;align-self:center}
    .face.f3 .pip:nth-child(3){justify-self:start;align-self:end}
    .face.f4{display:grid;grid-template:1fr 1fr/1fr 1fr}
    .face.f5{display:grid;grid-template:1fr 1fr 1fr/1fr 1fr}
    .face.f5 .pip:nth-child(3){grid-column:1/3;justify-self:center}
    .face.f6{display:grid;grid-template:1fr 1fr 1fr/1fr 1fr}

    .dice-num{position:absolute;bottom:8px;left:50%;transform:translateX(-50%) scale(0.5);font-size:28px;font-weight:800;color:var(--accent);opacity:0;transition:opacity .4s ease, transform .4s cubic-bezier(.2,1,.3,1);text-shadow:0 2px 8px rgba(255,107,107,.3);pointer-events:none}
    .dice-num.show{opacity:1;transform:translateX(-50%) scale(1)}

    /* Controls */
    .ctrls{text-align:center;margin-top:12px}
    .roll-btn{background:linear-gradient(135deg,var(--accent),#ee5a5a);color:#fff;border:0;padding:14px 40px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 16px rgba(255,107,107,.4);transition:.2s}
    .roll-btn:hover{transform:translateY(-2px)}
    .roll-btn:disabled{background:var(--gray);cursor:not-allowed;transform:none;box-shadow:none}

    .status{text-align:center;margin-top:12px;padding:10px;background:var(--light);border-radius:8px;font-size:14px;font-weight:600}

    /* Modal */
    .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .moverlay.show{display:flex}
    .mdl{background:#fff;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;text-align:center;animation:mIn .3s}
    @keyframes mIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
    .mdl-icon{font-size:56px;margin-bottom:12px}
    .mdl-title{font-size:22px;font-weight:800;margin-bottom:8px}
    .mdl-desc{font-size:15px;color:var(--gray);margin-bottom:20px;line-height:1.5}
    .mdl-btn{background:var(--primary);color:#fff;border:0;padding:12px 32px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font)}

    .result{display:none;text-align:center;padding:20px 0}
    .result.show{display:block}
    .result h2{font-size:22px;font-weight:800;margin-bottom:16px}
    .rplayer{text-align:left;margin:12px 0;padding:12px;background:var(--light);border-radius:10px}
    .rplayer-name{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .ritem{font-size:13px;padding:4px 0}
    .restart-btn{background:var(--green);color:#fff;border:0;padding:14px 40px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:16px}

    .hidden{display:none}

    @media(max-width:480px){
      .header h1{font-size:22px}.game{padding:10px;margin:8px 8px 16px}
      .cell .ico{font-size:14px}.cell .nm{font-size:7px}
      .tk{width:20px;height:20px;font-size:10px}
      .roll-btn{padding:12px 32px;font-size:16px}
      .dice-stage{height:120px}.cube{width:50px;height:50px}
      .face{width:50px;height:50px;border-radius:6px;padding:6px;gap:4px}
      .face.f1{transform:translateZ(25px)}.face.f2{transform:rotateY(180deg) translateZ(25px)}
      .face.f3{transform:rotateY(-90deg) translateZ(25px)}.face.f4{transform:rotateY(90deg) translateZ(25px)}
      .face.f5{transform:rotateX(90deg) translateZ(25px)}.face.f6{transform:rotateX(-90deg) translateZ(25px)}
      .pip{width:9px;height:9px}.face.f1 .pip{width:12px;height:12px}
    }
  </style>
</head>
<body>
<header class="header"><h1>🎲 부루마블 이벤트</h1><p>주사위를 굴려 경품을 획득하세요!</p></header>
<div class="game">
  <div class="setup" id="setup">
    <h2>참여 인원을 선택하세요</h2>
    <div class="setup-opts" id="opts"></div>
    <button class="start-btn" id="startBtn" disabled>게임 시작</button>
  </div>
  <div id="gs" class="hidden">
    <div class="players" id="pl"></div>
    <div class="board-wrap" id="bw"><div class="board" id="bd"></div></div>
    <div class="dice-stage" id="stage">
      <div class="dice-shadow" id="dsh"></div>
      <div class="dice-pos" id="dpos">
        <div class="cube" id="cube">
          <div class="face f1"><span class="pip"></span></div>
          <div class="face f2"><span class="pip"></span><span class="pip"></span></div>
          <div class="face f3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
          <div class="face f4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
          <div class="face f5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
          <div class="face f6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        </div>
      </div>
      <div class="dice-num" id="dnum"></div>
    </div>
    <div class="ctrls" id="ctrls"><button class="roll-btn" id="rollBtn">🎲 주사위 굴리기</button></div>
    <div class="status" id="st">주사위를 굴려 게임을 시작하세요!</div>
    <div class="result" id="res"><span class="mdl-icon">🎉</span><h2>게임 완료!</h2><div id="rc"></div><button class="restart-btn" id="rstBtn">🔄 다시 하기</button></div>
  </div>
</div>
<div class="moverlay" id="mo"><div class="mdl"><div class="mdl-icon" id="mi"></div><div class="mdl-title" id="mt"></div><div class="mdl-desc" id="md"></div><button class="mdl-btn" id="mb">확인</button></div></div>

<script>
var CELLS=[
{id:0,name:'출발',type:'start',icon:'🚀'},
{id:1,name:'10%쿠폰',type:'coupon',icon:'🎁',reward:'10% 할인 쿠폰'},
{id:2,name:'꽝',type:'blank',icon:'💨'},
{id:3,name:'미션',type:'mission',icon:'🎯',reward:'SNS 공유 미션'},
{id:4,name:'보너스',type:'bonus',icon:'🎲'},
{id:5,name:'무료배송',type:'coupon',icon:'📦',reward:'무료배송 쿠폰'},
{id:6,name:'꽝',type:'blank',icon:'💨'},
{id:7,name:'특별경품',type:'special',icon:'⭐',reward:'특별 경품 당첨!'},
{id:8,name:'미션',type:'mission',icon:'🎯',reward:'사진 찍기 미션'},
{id:9,name:'꽝',type:'blank',icon:'💨'},
{id:10,name:'5%쿠폰',type:'coupon',icon:'🎁',reward:'5% 할인 쿠폰'},
{id:11,name:'보너스',type:'bonus',icon:'🎲'},
{id:12,name:'미션',type:'mission',icon:'🎯',reward:'리뷰 작성 미션'},
{id:13,name:'꽝',type:'blank',icon:'💨'},
{id:14,name:'20%쿠폰',type:'coupon',icon:'🎁',reward:'20% 할인 쿠폰'},
{id:15,name:'꽝',type:'blank',icon:'💨'},
{id:16,name:'특별경품',type:'special',icon:'⭐',reward:'특별 경품 당첨!'},
{id:17,name:'미션',type:'mission',icon:'🎯',reward:'친구 태그 미션'},
{id:18,name:'보너스',type:'bonus',icon:'🎲'},
{id:19,name:'꽝',type:'blank',icon:'💨'}
];
var GM=[[0,1,2,3,4,5],[19,-1,-1,-1,-1,6],[18,-1,-1,-1,-1,7],[17,-1,-1,-1,-1,8],[16,-1,-1,-1,-1,9],[15,14,13,12,11,10]];
var PI=['🔴','🔵','🟢','🟡'],PN=['플레이어1','플레이어2','플레이어3','플레이어4'];
/* 결과 면 + 살짝 대각 기울기 (윗면이 사용자에게 보이도록) */
var FROT={
  1:'rotateX(-25deg) rotateY(8deg)',
  2:'rotateX(-25deg) rotateY(188deg)',
  3:'rotateX(-25deg) rotateY(-82deg)',
  4:'rotateX(-25deg) rotateY(98deg)',
  5:'rotateX(65deg) rotateY(8deg)',
  6:'rotateX(-115deg) rotateY(8deg)'
};
var pc=0,ps=[],cp=0,rl=false,af=false;

/* Setup */
var opts=document.getElementById('opts');
[1,2,3,4].forEach(function(n){var b=document.createElement('button');b.className='setup-btn';b.textContent=n;b.onclick=function(){document.querySelectorAll('.setup-btn').forEach(function(x){x.classList.remove('sel')});b.classList.add('sel');pc=n;document.getElementById('startBtn').disabled=false};opts.appendChild(b)});
document.getElementById('startBtn').onclick=function(){if(pc<1)return;startGame(pc)};
document.getElementById('rstBtn').onclick=goSetup;

function startGame(n){
  ps=[];for(var i=0;i<n;i++)ps.push({id:i,pos:0,rw:[],fin:false});
  cp=0;rl=false;af=false;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('gs').classList.remove('hidden');
  document.getElementById('ctrls').style.display='';
  document.getElementById('st').style.display='';
  document.getElementById('res').classList.remove('show');
  document.getElementById('dnum').classList.remove('show');
  document.getElementById('rollBtn').disabled=false;
  resetDicePos();buildBoard();renderPtags();createToks();posAll(false);updStatus();
}
function goSetup(){
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('gs').classList.add('hidden');
  document.querySelectorAll('.setup-btn').forEach(function(b){b.classList.remove('sel')});
  document.getElementById('startBtn').disabled=true;pc=0;
}

/* Board */
function buildBoard(){
  var bd=document.getElementById('bd');bd.innerHTML='';
  for(var r=0;r<6;r++)for(var c=0;c<6;c++){var idx=GM[r][c],d=document.createElement('div');
    if(idx===-1){d.className='cell hide'}
    else{var cl=CELLS[idx];d.className='cell '+cl.type;d.setAttribute('data-c',idx);d.innerHTML='<span class="ico">'+cl.icon+'</span><span class="nm">'+cl.name+'</span>'}
    bd.appendChild(d)}
}
function gCE(i){return document.querySelector('[data-c="'+i+'"]')}
function hiCell(i){document.querySelectorAll('.cell.active').forEach(function(c){c.classList.remove('active')});var e=gCE(i);if(e)e.classList.add('active')}

/* Tokens */
function createToks(){var w=document.getElementById('bw');w.querySelectorAll('.tk').forEach(function(t){t.remove()});ps.forEach(function(p){var t=document.createElement('div');t.className='tk tk'+p.id;t.id='t'+p.id;t.textContent=PI[p.id];w.appendChild(t)})}
function posTok(pid,ci,an){
  var t=document.getElementById('t'+pid),ce=gCE(ci),w=document.getElementById('bw');if(!t||!ce||!w)return;
  var wr=w.getBoundingClientRect(),cr=ce.getBoundingClientRect(),of=[[-6,-6],[6,-6],[-6,6],[6,6]],oi=0;
  if(ps.length>1){var s=ps.filter(function(p){return p.pos===ci&&!p.fin});for(var i=0;i<s.length;i++)if(s[i].id===pid){oi=i;break}oi%=4}
  t.style.transition=an?'left .25s,top .25s':'none';
  t.style.left=(cr.left-wr.left+cr.width/2-12+of[oi][0])+'px';
  t.style.top=(cr.top-wr.top+cr.height/2-12+of[oi][1])+'px';
}
function posAll(a){ps.forEach(function(p){if(!p.fin)posTok(p.id,p.pos,a)})}

/* Player tags */
function renderPtags(){
  document.getElementById('pl').innerHTML=ps.map(function(p){
    var a=p.id===cp&&!p.fin?' on':'',f=p.fin?' (완료)':'',r=p.rw.length>0?' 🎁'+p.rw.length:'';
    return '<div class="ptag'+a+'"><span class="pdot" style="background:'+['#FF6B6B','#4A90D9','#6BCB77','#FFD93D'][p.id]+'"></span><span>'+PN[p.id]+f+r+'</span></div>'
  }).join('')
}
function updStatus(){var p=ps[cp];document.getElementById('st').textContent=PI[p.id]+' '+PN[p.id]+'의 차례! (위치:'+p.pos+'번칸)';renderPtags();hiCell(p.pos)}

/* Dice physics */
function resetDicePos(){var dp=document.getElementById('dpos');dp.style.left='calc(50% - 30px)';dp.style.top='40px';document.getElementById('cube').style.transform='rotateX(-20deg) rotateY(20deg)'}

document.getElementById('rollBtn').onclick=rollDice;
function rollDice(){
  if(rl||af)return;rl=true;
  document.getElementById('rollBtn').disabled=true;
  document.getElementById('dnum').classList.remove('show');
  var result=Math.floor(Math.random()*6)+1;
  animDice(result,function(){
    var dn=document.getElementById('dnum');
    dn.textContent=result;
    dn.classList.add('show');
    setTimeout(function(){moveCur(result)},800);
  });
}

function animDice(res,cb){
  var dp=document.getElementById('dpos'),cube=document.getElementById('cube'),shEl=document.getElementById('dsh');
  var stage=document.getElementById('stage'),sw=stage.offsetWidth,stgH=stage.offsetHeight;
  var sz=60,floor=stgH-sz-8;

  /* 시작: 화면 밖 위에서 비스듬히 던져짐 */
  var startSide=Math.random()>.5;
  var x=startSide?sw*0.15+Math.random()*30:sw*0.65+Math.random()*30;
  var y=-80-Math.random()*30;
  var vx=startSide?(1.5+Math.random()*2.5):-(1.5+Math.random()*2.5);
  var vy=-1+Math.random()*1.5; /* 살짝 위로 던지는 느낌 */

  /* 물리 상수 */
  var gravity=0.25; /* 느린 중력 = 더 부드러운 낙하 */
  var bounceDamp=0.42;
  var wallDamp=0.25;
  var airFric=0.997;
  var groundFric=0.96;

  /* 3D 회전 */
  var rx=Math.random()*60,ry=Math.random()*60,rz=Math.random()*60;
  var vrx=6+Math.random()*10,vry=5+Math.random()*8,vrz=3+Math.random()*6;
  var rotDamp=0.975; /* 공중 회전 감쇠 */
  var rotGroundDamp=0.88; /* 바닥 회전 감쇠 (빠르게 멈춤) */

  var bounceN=0,settled=false,frame=0;
  var onGround=false;

  dp.style.transition='none';cube.style.transition='none';shEl.style.transition='none';

  function tick(){
    if(settled)return;
    frame++;

    /* 중력 */
    vy+=gravity;

    /* 이동 */
    x+=vx;
    y+=vy;

    /* 바닥 충돌 */
    if(y>=floor){
      y=floor;
      onGround=true;
      if(Math.abs(vy)>1.5){
        vy=-vy*bounceDamp;
        bounceN++;
        /* 바운스마다 회전 감쇠 */
        vrx*=0.55;vry*=0.55;vrz*=0.55;
      } else {
        vy=0;
        onGround=true;
      }
    } else {
      onGround=false;
    }

    /* 벽 충돌 */
    if(x<8){x=8;vx=-vx*wallDamp}
    if(x+sz>sw-8){x=sw-sz-8;vx=-vx*wallDamp}

    /* 마찰 */
    if(onGround){
      vx*=groundFric;
      vrx*=rotGroundDamp;vry*=rotGroundDamp;vrz*=rotGroundDamp;
    } else {
      vx*=airFric;
      vrx*=rotDamp;vry*=rotDamp;vrz*=rotDamp;
    }

    /* 회전 적용 */
    rx+=vrx;ry+=vry;rz+=vrz;

    /* 렌더 */
    dp.style.left=x+'px';
    dp.style.top=y+'px';
    cube.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg) rotateZ('+rz+'deg)';

    /* 그림자 (높이에 따라 크기+흐림 변화) */
    var heightRatio=Math.max(0,(floor-y)/floor);
    var shScale=1-heightRatio*0.6;
    var shOp=0.35-heightRatio*0.25;
    shEl.style.left=(x+sz/2-20)+'px';
    shEl.style.top=(floor+sz)+'px';
    shEl.style.transform='scaleX('+shScale+') scaleY('+shScale+')';
    shEl.style.opacity=Math.max(0.08,shOp);

    /* 정지 판단 */
    var totalEnergy=Math.abs(vx)+Math.abs(vy)+Math.abs(vrx)+Math.abs(vry)+Math.abs(vrz);
    if(onGround && totalEnergy<1.2 && bounceN>=2 || frame>300){
      settled=true;

      /* 부드럽게 결과 면으로 전환 (wobble 효과) */
      var finalRot=FROT[res];

      /* 1단계: 살짝 흔들리며 결과 면 근처로 */
      cube.style.transition='transform 0.6s cubic-bezier(0.15, 0.85, 0.35, 1.05)';
      cube.style.transform=finalRot;

      /* 2단계: 미세 흔들림 후 완전 정지 */
      setTimeout(function(){
        cube.style.transition='transform 0.3s ease-out';
        cube.style.transform=finalRot+' rotateZ(2deg)';
        setTimeout(function(){
          cube.style.transform=finalRot+' rotateZ(-1deg)';
          setTimeout(function(){
            cube.style.transform=finalRot+' rotateZ(0deg)';
            setTimeout(cb,200);
          },150);
        },150);
      },600);

      return;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* Move */
function moveCur(steps){
  var p=ps[cp],tp=p.pos+steps;if(tp>=20)tp=20;
  var arr=[];for(var i=p.pos+1;i<=Math.min(tp,19);i++)arr.push(i);
  if(!arr.length){finP(cp);return}
  var s=0,iv=setInterval(function(){
    if(s>=arr.length){clearInterval(iv);p.pos=arr[arr.length-1];posAll(false);if(tp>=20)finP(cp);else trigEv(cp,p.pos);return}
    p.pos=arr[s];posTok(p.id,arr[s],true);hiCell(arr[s]);s++;
  },300);
}

/* Events */
function trigEv(pi,ci){
  var c=CELLS[ci],p=ps[pi];if(!c){nxTurn();return}
  var h={start:function(){nxTurn()},
    coupon:function(){p.rw.push(c.reward);showM('🎁','쿠폰 획득!',PN[pi]+'님이 '+c.reward+'을 획득!',0)},
    mission:function(){p.rw.push(c.reward);showM('🎯','미션!',PN[pi]+'님! '+c.reward,0)},
    blank:function(){showM('💨','아쉬워요!',PN[pi]+'님, 다음 기회를 노려보세요!',0)},
    bonus:function(){showM('🎲','보너스!',PN[pi]+'님, 주사위를 한 번 더!',1)},
    special:function(){p.rw.push(c.reward);showM('⭐','축하합니다!',PN[pi]+'님! '+c.reward,0)}
  };(h[c.type]||function(){nxTurn()})();
}

var pBonus=false;
function showM(ic,tt,ds,bn){
  document.getElementById('mi').textContent=ic;document.getElementById('mt').textContent=tt;
  document.getElementById('md').textContent=ds;document.getElementById('mo').classList.add('show');
  pBonus=!!bn;document.getElementById('mb').onclick=function(){document.getElementById('mo').classList.remove('show');if(pBonus)enRoll();else nxTurn()};
}

function nxTurn(){if(chkAll())return;do{cp=(cp+1)%ps.length}while(ps[cp].fin&&!chkAll());if(chkAll())return;enRoll();updStatus();posAll(false)}
function enRoll(){rl=false;document.getElementById('rollBtn').disabled=false;updStatus();resetDicePos()}
function finP(pi){ps[pi].fin=true;var t=document.getElementById('t'+pi);if(t)t.style.opacity='.4';renderPtags();if(chkAll())showRes();else showM('🏁','골인!',PN[pi]+'님이 완주!',0)}
function chkAll(){af=ps.every(function(p){return p.fin});return af}

function showRes(){
  document.getElementById('ctrls').style.display='none';document.getElementById('st').style.display='none';
  document.getElementById('res').classList.add('show');
  var h='';ps.forEach(function(p){
    h+='<div class="rplayer"><div class="rplayer-name"><span class="pdot" style="width:16px;height:16px;border-radius:50%;display:inline-block;background:'+['#FF6B6B','#4A90D9','#6BCB77','#FFD93D'][p.id]+'"></span> '+PN[p.id]+' - '+p.rw.length+'개 경품</div>';
    if(!p.rw.length)h+='<div class="ritem">😅 획득한 경품이 없습니다</div>';
    else p.rw.forEach(function(r){h+='<div class="ritem">🎁 '+r+'</div>'});h+='</div>'});
  document.getElementById('rc').innerHTML=h;
}

window.addEventListener('resize',function(){posAll(false)});
</script>
